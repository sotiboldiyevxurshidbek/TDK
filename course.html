<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kurs — TDK</title>

  <script>
    (function () {
      const saved = localStorage.getItem("tdk-theme");
      const theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;600;700&family=Manrope:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="logo">TDK</a>

      <div class="nav-drawer" data-nav-drawer>
        <nav class="nav">
          <a data-i18n="nav_home" href="index.html#home"></a>
          <a data-i18n="nav_about" href="index.html#about"></a>
          <a data-i18n="nav_why" href="index.html#why"></a>
          <a data-i18n="nav_courses" href="index.html#courses"></a>
          <a data-i18n="nav_teachers" href="index.html#teachers"></a>
          <a data-i18n="nav_contact" href="index.html#contact"></a>
        </nav>
        <div class="lang-switcher">
          <button data-lang-option="uz-latin">UZ</button>
          <button data-lang-option="uz-cyrillic">ЎЗ</button>
          <button data-lang-option="ru">RU</button>
          <button data-lang-option="en">EN</button>
        </div>
      </div>

      <div class="header__controls">
        <button data-theme-toggle aria-label="Temani almashtirish">🌓</button>
        <a class="btn btn--primary" data-i18n="cta_admission" href="index.html#admission"></a>
        <button class="nav-toggle" data-nav-toggle aria-label="Menyu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="course-page-wrap" data-course-page></div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 TDK — Ta'lim Dunyo Kaliti</p>
  </footer>

  <script src="js/translations.js"></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/theme.js" defer></script>
  <script src="js/nav.js" defer></script>
  <script src="js/courses-data.js" defer></script>
  <script src="js/course-page.js" defer></script>
</body>
</html>
