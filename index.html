<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TDK — Ta'lim Dunyo Kaliti</title>

  <script>
    (function () {
      const saved = localStorage.getItem("tdk-theme");
      const theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;600;700&family=Manrope:wght@400;500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <header class="header">
    <div class="header__inner">
      <a href="/" class="logo">TDK</a>

      <div class="nav-drawer" data-nav-drawer>
        <nav class="nav">
          <a data-i18n="nav_home" href="#home"></a>
          <a data-i18n="nav_about" href="#about"></a>
          <a data-i18n="nav_why" href="#why"></a>
          <a data-i18n="nav_courses" href="#courses"></a>
          <a data-i18n="nav_teachers" href="#teachers"></a>
          <a data-i18n="nav_contact" href="#contact"></a>
        </nav>
        <div class="lang-switcher">
          <button data-lang-option="uz-latin">UZ</button>
          <button data-lang-option="uz-cyrillic">ЎЗ</button>
          <button data-lang-option="ru">RU</button>
          <button data-lang-option="en">EN</button>
        </div>
      </div>

      <div class="header__controls">
        <button data-theme-toggle aria-label="Temani almashtirish">🌓</button>
        <a class="btn btn--primary" data-i18n="cta_admission" href="#admission"></a>
        <button class="nav-toggle" data-nav-toggle aria-label="Menyu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>

    <!-- HERO -->
    <section class="hero" id="home">
      <div class="hero__inner">
        <div class="hero__content">
          <p class="hero__eyebrow" data-i18n="hero_eyebrow"></p>
          <h1 class="hero__title" data-i18n="hero_title"></h1>
          <p class="hero__subtitle" data-i18n="hero_subtitle"></p>
          <div class="hero__actions">
            <a class="btn btn--primary" data-i18n="cta_courses" href="#courses"></a>
            <a class="btn btn--ghost" data-i18n="cta_admission" href="#admission"></a>
          </div>
        </div>

        <div class="hero__panel">
          <p class="hero__panel-eyebrow" data-i18n="hero_panel_eyebrow"></p>
          <p class="hero__panel-title" data-i18n="hero_panel_title"></p>
          <ul class="hero__panel-list">
            <li data-i18n="hero_panel_item1"></li>
            <li data-i18n="hero_panel_item2"></li>
            <li data-i18n="hero_panel_item3"></li>
          </ul>
          <a class="btn btn--primary hero__panel-cta" data-i18n="hero_panel_cta" href="#admission"></a>
        </div>
      </div>
    </section>

    <!-- FANLAR TASMASI -->
    <div class="subject-ticker" aria-hidden="true">
      <div class="subject-ticker__track">
        <span data-i18n="subj_math"></span><span class="dot"></span>
        <span data-i18n="subj_english"></span><span class="dot"></span>
        <span data-i18n="subj_history"></span><span class="dot"></span>
        <span data-i18n="subj_native"></span><span class="dot"></span>
        <span data-i18n="subj_russian"></span><span class="dot"></span>
        <span data-i18n="subj_math"></span><span class="dot"></span>
        <span data-i18n="subj_english"></span><span class="dot"></span>
        <span data-i18n="subj_history"></span><span class="dot"></span>
        <span data-i18n="subj_native"></span><span class="dot"></span>
        <span data-i18n="subj_russian"></span><span class="dot"></span>
      </div>
    </div>

    <!-- BIZ HAQIMIZDA -->
    <section class="about" id="about">
      <div class="about__inner">
        <p class="section-eyebrow" data-i18n="about_eyebrow"></p>
        <h2 class="section-title" data-i18n="about_title"></h2>
        <p class="about__text" data-i18n="about_text"></p>

        <div class="about__pillars">
          <div class="pillar">
            <h3 data-i18n="about_pillar1_title"></h3>
            <p data-i18n="about_pillar1_text"></p>
          </div>
          <div class="pillar">
            <h3 data-i18n="about_pillar2_title"></h3>
            <p data-i18n="about_pillar2_text"></p>
          </div>
          <div class="pillar">
            <h3 data-i18n="about_pillar3_title"></h3>
            <p data-i18n="about_pillar3_text"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- NEGA TDK -->
    <section class="why" id="why">
      <div class="why__inner">
        <p class="section-eyebrow" data-i18n="why_eyebrow"></p>
        <h2 class="section-title" data-i18n="why_title"></h2>

        <div class="why__grid">
          <div class="why-card">
            <svg class="why-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/></svg>
            <h3 data-i18n="why_card1_title"></h3>
            <p data-i18n="why_card1_text"></p>
          </div>
          <div class="why-card">
            <svg class="why-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-3 11c.4.3.6.8.6 1.3V16h4.8v-.7c0-.5.2-1 .6-1.3A6 6 0 0 0 12 3Z"/></svg>
            <h3 data-i18n="why_card2_title"></h3>
            <p data-i18n="why_card2_text"></p>
          </div>
          <div class="why-card">
            <svg class="why-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3.5" y="5" width="17" height="16" rx="2"/><path d="M3.5 9.5h17M8 3v4M16 3v4"/></svg>
            <h3 data-i18n="why_card3_title"></h3>
            <p data-i18n="why_card3_text"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- STATISTIKA -->
    <section class="stats">
      <div class="stats__inner">
        <p class="section-eyebrow stats__eyebrow" data-i18n="stats_eyebrow"></p>
        <h2 class="section-title stats__title" data-i18n="stats_title"></h2>

        <div class="stats__grid">
          <div class="stat">
            <span class="stat__number" data-counter data-target="500" data-suffix="+">0</span>
            <p data-i18n="stat1_label"></p>
          </div>
          <div class="stat">
            <span class="stat__number" data-counter data-target="98" data-suffix="%">0</span>
            <p data-i18n="stat2_label"></p>
          </div>
          <div class="stat">
            <span class="stat__number" data-counter data-target="12" data-suffix="+">0</span>
            <p data-i18n="stat3_label"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- KURSLAR -->
<section class="courses" id="courses">
  <div class="courses__inner">
    <p class="section-eyebrow" data-i18n="courses_eyebrow"></p>
    <h2 class="section-title" data-i18n="courses_title"></h2>
    <div class="courses__grid" data-courses-grid></div>
  </div>
</section>
   <!-- O'QITUVCHILAR -->
<section class="teachers" id="teachers">
  <div class="teachers__inner">
    <p class="section-eyebrow" data-i18n="teachers_eyebrow"></p>
    <h2 class="section-title" data-i18n="teachers_title"></h2>
    <div class="teachers__grid" data-teachers-grid></div>
  </div>
</section>

<!-- GALEREYA -->
<section class="gallery" id="gallery">
  <div class="gallery__inner">
    <p class="section-eyebrow" data-i18n="gallery_eyebrow"></p>
    <h2 class="section-title" data-i18n="gallery_title"></h2>

    <div class="gallery__grid">
      <button class="gallery-item" data-gallery-item data-i18n-caption="gallery_caption_1">
        <span class="gallery-item__media"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3.5"/><path d="M8 5l1.5-2h5L16 5"/></svg></span>
      </button>
      <button class="gallery-item" data-gallery-item data-i18n-caption="gallery_caption_2">
        <span class="gallery-item__media"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3.5"/><path d="M8 5l1.5-2h5L16 5"/></svg></span>
      </button>
      <button class="gallery-item" data-gallery-item data-i18n-caption="gallery_caption_3">
        <span class="gallery-item__media"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3.5"/><path d="M8 5l1.5-2h5L16 5"/></svg></span>
      </button>
      <button class="gallery-item" data-gallery-item data-i18n-caption="gallery_caption_4">
        <span class="gallery-item__media"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3.5"/><path d="M8 5l1.5-2h5L16 5"/></svg></span>
      </button>
      <button class="gallery-item" data-gallery-item data-i18n-caption="gallery_caption_5">
        <span class="gallery-item__media"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3.5"/><path d="M8 5l1.5-2h5L16 5"/></svg></span>
      </button>
      <button class="gallery-item" data-gallery-item data-i18n-caption="gallery_caption_6">
        <span class="gallery-item__media"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3.5"/><path d="M8 5l1.5-2h5L16 5"/></svg></span>
      </button>
    </div>
  </div>
</section>

<div class="gallery-lightbox" data-gallery-lightbox>
  <button class="gallery-lightbox__close" data-gallery-close aria-label="Yopish">✕</button>
  <div class="gallery-lightbox__media" data-gallery-lightbox-media></div>
  <p class="gallery-lightbox__caption" data-gallery-lightbox-caption></p>
</div>

<!-- SERTIFIKATLAR -->
<section class="certificates">
  <div class="certificates__inner">
    <p class="section-eyebrow" data-i18n="certificates_eyebrow"></p>
    <h2 class="section-title" data-i18n="certificates_title"></h2>
    <div class="certificates__grid">
      <div class="cert-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="9" r="5"/><path d="M8.5 13.5 7 21l5-2.5L17 21l-1.5-7.5"/></svg>
        <p data-i18n="cert_badge_1"></p>
      </div>
      <div class="cert-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15Z"/></svg>
        <p data-i18n="cert_badge_2"></p>
      </div>
      <div class="cert-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a13 13 0 0 1 0 18M12 3a13 13 0 0 0 0 18"/></svg>
        <p data-i18n="cert_badge_3"></p>
      </div>
      <div class="cert-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 19V11M10 19V6M16 19v-8M3 19h18"/></svg>
        <p data-i18n="cert_badge_4"></p>
      </div>
    </div>
  </div>
</section>

    <!-- 5-bo'lim: FAQ / Yangiliklar -->
    <!-- BOG'LANISH + ONLINE QABUL -->
<section class="contact" id="contact">
  <div class="contact__inner">

    <div class="contact__info">
      <p class="section-eyebrow" data-i18n="contact_eyebrow"></p>
      <h2 class="section-title" data-i18n="contact_title"></h2>

      <ul class="contact__list">
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 21s-7-6.5-7-11a7 7 0 1 1 14 0c0 4.5-7 11-7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
          <div><span data-i18n="contact_address_label"></span><p data-i18n="contact_address_value"></p></div>
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.8.6 2.7a2 2 0 0 1-.4 2.1L8 9.7a16 16 0 0 0 6 6l1.2-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.5 2.7.6a2 2 0 0 1 1.7 2Z"/></svg>
          <div><span data-i18n="contact_phone_label"></span><p data-i18n="contact_phone_value"></p></div>
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
          <div><span data-i18n="contact_hours_label"></span><p data-i18n="contact_hours_value"></p></div>
        </li>
      </ul>

     <div class="contact__map">
  <iframe
    src="https://www.google.com/maps?q=40.92401806912387,71.56912137393734&z=16&output=embed"
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade"
    allowfullscreen>
  </iframe>
</div>
    </div>

    <div class="admission" id="admission">
      <p class="section-eyebrow" data-i18n="admission_eyebrow"></p>
      <h2 class="section-title" data-i18n="admission_title"></h2>
      <p class="admission__subtitle" data-i18n="admission_subtitle"></p>

      <form class="admission-form" data-admission-form novalidate>
        <div class="form-row">
          <div class="form-field">
            <label data-i18n="form_firstname_label"></label>
            <input type="text" name="firstname" data-i18n-placeholder="form_firstname_placeholder" />
          </div>
          <div class="form-field">
            <label data-i18n="form_lastname_label"></label>
            <input type="text" name="lastname" data-i18n-placeholder="form_lastname_placeholder" />
          </div>
        </div>

        <div class="form-field">
          <label data-i18n="form_phone_label"></label>
          <input type="tel" name="phone" inputmode="tel" data-i18n-placeholder="form_phone_placeholder" />
        </div>

        <div class="form-field">
          <label data-i18n="form_course_label"></label>
          <select name="course" data-course-select></select>
        </div>

        <div class="form-field">
          <label data-i18n="form_message_label"></label>
          <textarea name="message" rows="3" data-i18n-placeholder="form_message_placeholder"></textarea>
        </div>

        <p class="form-status" data-form-status hidden></p>

        <button type="submit" class="btn btn--primary admission-form__submit" data-form-submit data-i18n="form_submit"></button>
      </form>
    </div>

  </div>
</section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 TDK — Ta'lim Dunyo Kaliti</p>
  </footer>

  <script src="js/translations.js"></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/theme.js" defer></script>
  <script src="js/nav.js" defer></script>
  <script src="js/counters.js" defer></script>
  <script src="js/courses-data.js" defer></script>
  <script src="js/courses-render.js" defer></script>
  <script src="js/teachers-data.js" defer></script>
  <script src="js/teachers-render.js" defer></script>
  <script src="js/testimonials-data.js" defer></script>
  <script src="js/testimonials-render.js" defer></script>
  <script src="js/gallery.js" defer></script>
  <script src="js/telegram-config.js" defer></script>
  <script src="js/admission-form.js" defer></script>
</body>
</html>
